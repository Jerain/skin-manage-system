<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375px, initial-scale=1.0">
    <title>客户端小程序首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; width: 375px; margin: 0 auto; border: 1px solid #ddd; min-height: 700px; }
        
        /* Header */
        .header { background: #fff; padding: 15px; display: flex; align-items: center; gap: 10px; }
        .search-bar { flex: 1; background: #f5f5f5; padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; gap: 8px; color: #999; font-size: 14px; }
        
        /* Quick Actions */
        .quick-actions { display: flex; justify-content: space-around; background: #fff; padding: 20px; margin-top: 10px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .action-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .action-item text { font-size: 12px; color: #666; }
        
        /* Section */
        .section { background: #fff; margin: 15px; border-radius: 10px; padding: 15px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-title { font-size: 16px; font-weight: bold; }
        .section-more { font-size: 12px; color: #999; }
        
        /* Store Card */
        .store-card { display: flex; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .store-card:last-child { border-bottom: none; }
        .store-img { width: 70px; height: 70px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; }
        .store-info { flex: 1; margin-left: 12px; display: flex; flex-direction: column; gap: 5px; }
        .store-name { font-size: 15px; font-weight: bold; }
        .store-address { font-size: 12px; color: #999; }
        .store-meta { display: flex; gap: 10px; font-size: 11px; color: #999; }
        
        /* Service Card */
        .service-scroll { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; }
        .service-card { min-width: 100px; background: #f9f9f9; border-radius: 10px; padding: 12px; text-align: center; }
        .service-name { font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .service-price { color: #ff4d4f; font-size: 14px; font-weight: bold; }
        .service-duration { font-size: 11px; color: #999; margin-top: 5px; }
    </style>
</head>
<body>
    <!-- Header -->
    <view class="header">
        <div class="search-bar">🔍 搜索门店</div>
    </view>
    
    <!-- Quick Actions -->
    <view class="quick-actions">
        <div class="action-item">
            <div class="action-icon" style="background: #e6f0ff;">📅</div>
            <text>立即预约</text>
        </div>
        <div class="action-item">
            <div class="action-icon" style="background: #e6f7ed;">📋</div>
            <text>我的订单</text>
        </div>
        <div class="action-item">
            <div class="action-icon" style="background: #fdf6ec;">🧴</div>
            <text>服务项目</text>
        </div>
    </view>
    
    <!-- Featured Stores -->
    <view class="section">
        <div class="section-header">
            <text class="section-title">推荐门店</text>
            <text class="section-more">更多 ></text>
        </div>
        <div class="store-card">
            <div class="store-img">🏪</div>
            <div class="store-info">
                <text class="store-name">测试皮肤管理店</text>
                <text class="store-address">北京市朝阳区测试路123号</text>
                <div class="store-meta">
                    <text>📞 010-12345678</text>
                    <text>🕐 09:00-21:00</text>
                </div>
            </div>
        </div>
        <div class="store-card">
            <div class="store-img" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">🏪</div>
            <div class="store-info">
                <text class="store-name">肌肤管理中心</text>
                <text class="store-address">北京市海淀区中关村大街1号</text>
                <div class="store-meta">
                    <text>📞 010-88888888</text>
                    <text>🕐 10:00-22:00</text>
                </div>
            </div>
        </div>
    </view>
    
    <!-- Hot Services -->
    <view class="section">
        <div class="section-header">
            <text class="section-title">热门项目</text>
            <text class="section-more">更多 ></text>
        </div>
        <div class="service-scroll">
            <div class="service-card">
                <div class="service-name">深层补水护理</div>
                <div class="service-price">¥299</div>
                <div class="service-duration">60分钟</div>
            </div>
            <div class="service-card">
                <div class="service-name">美白焕肤</div>
                <div class="service-price">¥599</div>
                <div class="service-duration">90分钟</div>
            </div>
            <div class="service-card">
                <div class="service-name">敏感肌修复</div>
                <div class="service-price">¥399</div>
                <div class="service-duration">75分钟</div>
            </div>
            <div class="service-card">
                <div class="service-name">抗衰紧致</div>
                <div class="service-price">¥899</div>
                <div class="service-duration">120分钟</div>
            </div>
        </div>
    </view>
</body>
</html>
