<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI助手(门店端) - 皮肤管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .avatar-container {
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(ellipse at center, #2a2a4e 0%, transparent 70%);
        }
        
        .avatar {
            width: 150px;
            height: 200px;
            position: relative;
            animation: breathe 3s ease-in-out infinite;
        }
        
        .avatar-body {
            width: 100px;
            height: 140px;
            background: linear-gradient(135deg, #34C759 0%, #30b350 100%);
            border-radius: 50px 50px 40px 40px;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .avatar-head {
            width: 80px;
            height: 90px;
            background: linear-gradient(135deg, #f5d0c5 0%, #e8c4b8 100%);
            border-radius: 40px 40px 35px 35px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }
        
        .avatar-hair {
            width: 90px;
            height: 50px;
            background: linear-gradient(135deg, #2d1f1f 0%, #1a1212 100%);
            border-radius: 45px 45px 0 0;
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }
        
        .avatar-face {
            position: absolute;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 40px;
        }
        
        .avatar-eyes {
            display: flex;
            justify-content: space-between;
            position: absolute;
            top: 0;
            width: 100%;
        }
        
        .avatar-eye {
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            position: relative;
        }
        
        .avatar-eye::after {
            content: '';
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
        }
        
        .avatar-mouth {
            width: 15px;
            height: 8px;
            border-bottom: 3px solid #d4736a;
            border-radius: 0 0 10px 10px;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.3s;
        }
        
        .avatar.speaking .avatar-mouth {
            height: 15px;
            border-radius: 50%;
            background: #d4736a;
        }
        
        .avatar-listening .avatar-eye {
            animation: blink 4s infinite;
        }
        
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }
        
        .status-text {
            position: absolute;
            bottom: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 24px 24px 0 0;
            margin-top: -20px;
            padding-top: 10px;
        }
        
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chat-header h2 {
            font-size: 18px;
            color: #333;
        }
        
        .mode-toggle {
            margin-left: auto;
            display: flex;
            background: #f5f5f5;
            border-radius: 20px;
            padding: 3px;
        }
        
        .mode-btn {
            padding: 6px 16px;
            border: none;
            background: transparent;
            border-radius: 18px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: #34C759;
            color: white;
        }
        
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 80%;
            display: flex;
            gap: 10px;
        }
        
        .message.user {
            flex-direction: row-reverse;
            align-self: flex-end;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: #34C759;
        }
        
        .message.ai .message-avatar {
            background: linear-gradient(135deg, #34C759, #30b350);
        }
        
        .message-content {
            background: #f5f5f5;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }
        
        .message.user .message-content {
            background: #34C759;
            color: white;
        }
        
        .message.ai .message-content {
            border-top-left-radius: 4px;
        }
        
        .message.user .message-content {
            border-top-right-radius: 4px;
        }
        
        .input-area {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
        }
        
        .input-box {
            flex: 1;
            display: flex;
            background: #f5f5f5;
            border-radius: 25px;
            padding: 5px 5px 5px 20px;
        }
        
        .input-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            outline: none;
            padding: 10px 0;
        }
        
        .input-box input::placeholder {
            color: #999;
        }
        
        .voice-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: linear-gradient(135deg, #34C759, #30b350);
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        
        .voice-btn:active {
            transform: scale(0.95);
        }
        
        .voice-btn.recording {
            background: #ff4757;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .send-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: #34C759;
            border-radius: 50%;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .quick-actions {
            display: flex;
            gap: 10px;
            padding: 0 20px 15px;
            flex-wrap: wrap;
        }
        
        .quick-btn {
            padding: 8px 16px;
            background: #f0f0f5;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
        }
        
        .quick-btn:active {
            background: #e0e0e5;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
        }
        
        .typing {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
            background: #f5f5f5;
            border-radius: 18px;
            width: fit-content;
        }
        
        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
        
        .data-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
            font-size: 13px;
        }
        
        .data-card .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
        }
        
        .data-card .row:last-child {
            border-bottom: none;
        }
        
        .data-card .label {
            color: #666;
        }
        
        .data-card .value {
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='store.html'">←</button>
    
    <div class="avatar-container">
        <div class="avatar" id="avatar">
            <div class="avatar-hair"></div>
            <div class="avatar-head">
                <div class="avatar-face">
                    <div class="avatar-eyes">
                        <div class="avatar-eye"></div>
                        <div class="avatar-eye"></div>
                    </div>
                    <div class="avatar-mouth"></div>
                </div>
            </div>
            <div class="avatar-body"></div>
        </div>
        <div class="status-text" id="statusText">你好，我是小美 👋</div>
    </div>
    
    <div class="chat-container">
        <div class="chat-header">
            <h2>💬 AI 助手</h2>
            <div class="mode-toggle">
                <button class="mode-btn active" onclick="setMode('voice')">🎙️ 语音</button>
                <button class="mode-btn" onclick="setMode('manual')">📝 手动</button>
            </div>
        </div>
        
        <div class="messages" id="messages">
            <div class="message ai">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    你好！我是门店端的AI助手小美～<br><br>
                    作为技师，我可以帮你：<br>
                    👥 客户管理<br>
                    📅 预约查看<br>
                    ✅ 考勤打卡<br>
                    📊 业绩查询<br>
                    📈 数据看板<br><br>
                    请告诉我你想要什么？
                </div>
            </div>
        </div>
        
        <div class="quick-actions">
            <button class="quick-btn" onclick="sendQuick('查看今日预约')">📅 今日预约</button>
            <button class="quick-btn" onclick="sendQuick('我的考勤状态')">✅ 考勤打卡</button>
            <button class="quick-btn" onclick="sendQuick('查询业绩')">📊 我的业绩</button>
            <button class="quick-btn" onclick="sendQuick('客户列表')">👥 客户列表</button>
        </div>
        
        <div class="input-area">
            <div class="input-box">
                <input type="text" id="messageInput" placeholder="输入你想说的话..." onkeypress="handleKeyPress(event)">
            </div>
            <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">🎤</button>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let currentMode = 'voice';
        let isRecording = false;
        let recognition = null;
        
        // 获取用户信息
        const userStr = localStorage.getItem('user');
        let userId = 1;
        let userRole = 'employee';
        
        if (userStr) {
            try {
                const user = JSON.parse(userStr);
                userId = user.id || 1;
            } catch(e) {}
        }
        
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (mode === 'voice') {
                document.getElementById('statusText').textContent = '🎙️ 语音模式已开启';
            } else {
                document.getElementById('statusText').textContent = '📝 手动模式已开启';
            }
            
            localStorage.setItem('ai_mode_store', mode);
        }
        
        const savedMode = localStorage.getItem('ai_mode_store');
        if (savedMode) {
            setMode(savedMode);
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            input.value = '';
            addMessage(message, 'user');
            showTyping();
            
            try {
                const response = await fetch(`${API_BASE}/ai-assistant/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        message: message,
                        context: { role: userRole, userId: userId }
                    })
                });
                
                const data = await response.json();
                hideTyping();
                
                if (data.success) {
                    addMessage(data.message, 'ai');
                    updateAvatar('listening');
                    document.getElementById('statusText').textContent = '有什么可以帮你的？';
                } else {
                    addMessage(data.message || '抱歉，出错了', 'ai');
                }
            } catch(e) {
                hideTyping();
                addMessage('网络错误，请稍后重试', 'ai');
            }
        }
        
        function sendQuick(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }
        
        function addMessage(content, sender) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `
                <div class="message-avatar">${sender === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">${content}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function showTyping() {
            updateAvatar('thinking');
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message ai';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function hideTyping() {
            document.getElementById('typingIndicator')?.remove();
        }
        
        function updateAvatar(state) {
            const avatar = document.getElementById('avatar');
            avatar.className = 'avatar ' + state;
            
            const statusText = document.getElementById('statusText');
            if (state === 'speaking') {
                statusText.textContent = '🔊 小美正在说话...';
            } else if (state === 'listening') {
                statusText.textContent = '👂 正在倾听...';
            } else if (state === 'thinking') {
                statusText.textContent = '💭 小美正在思考...';
            }
        }
        
        function toggleVoice() {
            const btn = document.getElementById('voiceBtn');
            
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('您的浏览器不支持语音识别，请使用手动输入');
                return;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.interimResults = false;
            
            if (!isRecording) {
                isRecording = true;
                btn.classList.add('recording');
                updateAvatar('listening');
                document.getElementById('statusText').textContent = '🎤 正在录音...';
                recognition.start();
            }
            
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('messageInput').value = transcript;
                sendMessage();
            };
            
            recognition.onerror = function(event) {
                console.error('语音识别错误:', event.error);
                stopRecording();
            };
            
            recognition.onend = function() {
                stopRecording();
            };
        }
        
        function stopRecording() {
            isRecording = false;
            const btn = document.getElementById('voiceBtn');
            btn.classList.remove('recording');
            document.getElementById('statusText').textContent = '有什么可以帮你的？';
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
