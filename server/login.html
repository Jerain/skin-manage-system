<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮肤管理系统 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.02);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }
        .error {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .links {
            margin-top: 20px;
            text-align: center;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #666;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🏪 皮肤管理系统</h1>
        <p class="subtitle">请登录您的账号</p>
        
        <div class="error" id="error"></div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('phone')">手机号登录</div>
            <div class="tab" onclick="switchTab('code')">验证码登录</div>
        </div>
        
        <!-- 手机号登录 -->
        <form id="phoneForm" class="tab-content active">
            <div class="form-group">
                <label>手机号</label>
                <input type="tel" id="phone" name="phone" required placeholder="请输入手机号" maxlength="11">
            </div>
            <div class="form-group">
                <label>验证码</label>
                <input type="text" id="code" name="code" required placeholder="请输入验证码" maxlength="6" style="width: 60%;">
                <button type="button" class="btn btn-secondary" onclick="sendCode()" id="sendBtn" style="width: 38%; padding: 14px;">发送验证码</button>
            </div>
            <button type="submit" class="btn" id="submitBtn1">登 录</button>
        </form>
        
        <!-- 注册表单 -->
        <form id="registerForm" class="tab-content">
            <div class="form-group">
                <label>手机号</label>
                <input type="tel" id="regPhone" name="phone" required placeholder="请输入手机号" maxlength="11">
            </div>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="regName" name="name" placeholder="请输入姓名（可选）">
            </div>
            <div class="form-group">
                <label>验证码</label>
                <input type="text" id="regCode" name="code" required placeholder="请输入验证码" maxlength="6" style="width: 60%;">
                <button type="button" class="btn btn-secondary" onclick="sendRegCode()" id="regSendBtn" style="width: 38%; padding: 14px;">发送验证码</button>
            </div>
            <button type="submit" class="btn" id="regBtn">注 册</button>
        </form>
        
        <div class="links">
            <a href="javascript:void(0)" onclick="toggleRegister()">立即注册</a>
            <a href="client.html">客户端入口</a>
            <a href="store.html">门店端入口</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let isRegister = false;
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'phone') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('phoneForm').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        
        function toggleRegister() {
            if (isRegister) {
                switchTab('phone');
                isRegister = false;
            } else {
                switchTab('code');
                isRegister = true;
            }
        }
        
        let countdown = 0;
        let countdown2 = 0;
        
        async function sendCode() {
            const phone = document.getElementById('phone').value;
            if (!phone || phone.length !== 11) {
                showError('请输入正确的手机号');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/auth/customer/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password: '123456' })  // 测试用固定验证码
                });
                
                const data = await res.json();
                
                if (res.ok && data.token || data.access_token) {
                    localStorage.setItem('token', data.token || data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.userInfo));
                    window.location.href = 'admin.html';
                } else {
                    // 用户不存在，提示注册
                    showError('账号不存在，请先注册');
                    setTimeout(() => toggleRegister(), 1500);
                }
            } catch (e) {
                showError('网络错误');
            }
        }
        
        async function sendRegCode() {
            const phone = document.getElementById('regPhone').value;
            if (!phone || phone.length !== 11) {
                showError('请输入正确的手机号');
                return;
            }
            
            // 开始倒计时
            countdown2 = 60;
            const btn = document.getElementById('regSendBtn');
            btn.disabled = true;
            
            const timer = setInterval(() => {
                countdown2--;
                btn.textContent = countdown2 + 's';
                if (countdown2 <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                }
            }, 1000);
            
            showError('验证码已发送（测试用固定码：123456）');
        }
        
        // 手机号登录表单
        document.getElementById('phoneForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('code').value;
            const submitBtn = document.getElementById('submitBtn1');
            
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';
            
            try {
                const response = await fetch(`${API_BASE}/auth/customer/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                
                const data = await response.json();
                
                // API 返回格式: {"code":0,"data":{"token":...,"userInfo":{...}}}
                const token = data.token || data.access_token || (data.data && data.data.token || data.access_token);
                const userInfo = data.userInfo || (data.data && data.data.userInfo);
                
                if (response.ok && token) {
                    localStorage.setItem('token', token);
                    localStorage.setItem('user', JSON.stringify(userInfo));
                    window.location.href = 'admin.html';
                } else {
                    showError(data.message || '登录失败');
                }
            } catch (error) {
                showError('网络错误');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '登 录';
            }
        });
        
        // 注册表单
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('regPhone').value;
            const name = document.getElementById('regName').value;
            const code = document.getElementById('regCode').value;
            const submitBtn = document.getElementById('regBtn');
            
            submitBtn.disabled = true;
            submitBtn.textContent = '注册中...';
            
            try {
                const response = await fetch(`${API_BASE}/auth/customer/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, name, code })
                });
                
                const data = await response.json();
                
                if (response.ok || data.code === 0) {
                    showError('注册成功，请登录');
                    setTimeout(() => switchTab('phone'), 1500);
                } else {
                    showError(data.message || '注册失败');
                }
            } catch (error) {
                showError('网络错误');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '注 册';
            }
        });
        
        function showError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
