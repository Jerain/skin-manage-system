<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的预约 - 皮肤管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
        .header { background: #667eea; color: white; padding: 20px; text-align: center; position: relative; }
        .back { position: absolute; left: 15px; top: 18px; color: white; text-decoration: none; }
        .list { padding: 15px; }
        .empty { text-align: center; padding: 60px 20px; color: #888; }
        .empty-icon { font-size: 60px; margin-bottom: 15px; }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .card-title { font-weight: bold; font-size: 16px; }
        .status { padding: 4px 10px; border-radius: 12px; font-size: 12px; }
        .status-pending { background: #fff3e0; color: #ff9800; }
        .status-completed { background: #e8f5e9; color: #4caf50; }
        .status-cancelled { background: #ffebee; color: #f44336; }
        .card-info { color: #666; font-size: 14px; margin-top: 5px; }
        .card-actions { margin-top: 10px; display: flex; gap: 10px; }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; }
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #f44336; color: white; }
        
        .loading { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <a href="client.html" class="back">← 返回</a>
        <h1>📅 我的预约</h1>
    </div>
    <div class="list" id="appointmentList">
        <div class="loading">加载中...</div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        // 从localStorage获取用户ID
        const userId = parseInt(localStorage.getItem('customerId')) || 1;
        
        async function loadAppointments() {
            try {
                const res = await fetch(`${API_BASE}/appointments?customerId=${userId}`);
                const data = await res.json();
                const appointments = data.data?.list || data.data || [];
                renderAppointments(appointments);
            } catch(e) {
                console.error('加载失败:', e);
                renderAppointments([]);
            }
        }
        
        function renderAppointments(list) {
            const container = document.getElementById('appointmentList');
            
            if (!list || !list.length) {
                container.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">📅</div>
                        <p>暂无预约记录</p>
                        <p style="font-size:14px;margin-top:10px;"><a href="page-services.html" style="color:#667eea;">去预约服务 →</a></p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = list.map(a => `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">${a.serviceName || a.service?.name || '皮肤管理服务'}</span>
                        <span class="status status-${a.status}">${getStatusText(a.status)}</span>
                    </div>
                    <div class="card-info">📍 门店：${a.storeName || a.store?.name || '门店'}</div>
                    <div class="card-info">👤 技师：${a.employeeName || a.employee?.name || '待分配'}</div>
                    <div class="card-info">📅 时间：${formatDate(a.appointmentDate)} ${a.appointmentTime || ''}</div>
                    <div class="card-actions">
                        ${a.status === 'pending' ? `<button class="btn btn-danger" onclick="cancelAppointment(${a.id})">取消预约</button>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function getStatusText(status) {
            const map = { pending: '待服务', completed: '已完成', cancelled: '已取消' };
            return map[status] || status;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return `${date.getMonth() + 1}月${date.getDate()}日`;
        }
        
        async function cancelAppointment(id) {
            if (!confirm('确定要取消该预约吗？')) return;
            
            try {
                const res = await fetch(`${API_BASE}/appointments/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'cancelled' })
                });
                alert('预约已取消');
                loadAppointments();
            } catch(e) {
                alert('取消失败，请重试');
            }
        }
        
        loadAppointments();
    </script>
</body>
</html>
