<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员中心 - 皮肤管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 30px 20px; text-align: center; }
        .avatar { width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 36px; }
        .user-name { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .user-level { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; font-size: 14px; display: inline-block; }
        .stats { display: flex; background: white; margin: 15px; border-radius: 12px; padding: 20px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-item { flex: 1; text-align: center; border-right: 1px solid #eee; }
        .stat-item:last-child { border-right: none; }
        .stat-value { font-size: 24px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #888; margin-top: 5px; }
        .menu { background: white; margin: 15px; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .menu-item { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:active { background: #f9f9f9; }
        .back { color: white; text-decoration: none; position: absolute; left: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="client.html" class="back">← 返回</a>
        <div class="avatar">👤</div>
        <div class="user-name" id="userName">未登录</div>
        <div class="user-level" id="userLevel">普通会员</div>
    </div>
    
    <div class="stats">
        <div class="stat-item">
            <div class="stat-value" id="points">0</div>
            <div class="stat-label">积分</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="balance">¥0</div>
            <div class="stat-label">余额</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="orders">0</div>
            <div class="stat-label">订单</div>
        </div>
    </div>
    
    <div class="menu">
        <div class="menu-item" onclick="location.href='page-skin-test.html'">🧴 肤质检测</div>
        <div class="menu-item" onclick="alert('功能开发中')">💳 充值</div>
        <div class="menu-item" onclick="alert('功能开发中')">🎁 邀请好友</div>
        <div class="menu-item" onclick="alert('功能开发中')">⚙️ 设置</div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        
        const userStr = localStorage.getItem('user');
        if (userStr) {
            try {
                const user = JSON.parse(userStr);
                document.getElementById('userName').textContent = user.name || '用户';
                document.getElementById('userLevel').textContent = user.level || '普通会员';
            } catch(e) {}
        }
    </script>
</body>
</html>
