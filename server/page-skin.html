<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>肤质检测 - 皮肤管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; text-align: center; position: relative; }
        .back { position: absolute; left: 15px; top: 18px; color: white; text-decoration: none; }
        .content { padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 30px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .scan-icon { width: 150px; height: 150px; margin: 0 auto 20px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .scan-icon span { font-size: 60px; }
        .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 16px 40px; border-radius: 30px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        .tips { margin-top: 30px; text-align: left; }
        .tips h3 { color: #333; margin-bottom: 15px; }
        .tip-item { background: #f9f9f9; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="client.html" class="back">← 返回</a>
        <h1>🧴 AI 肤质检测</h1>
    </div>
    <div class="content">
        <div class="card">
            <div class="scan-icon"><span>📸</span></div>
            <h2>AI 智能肤质分析</h2>
            <p style="color:#888;margin-top:10px;">上传照片，AI 智能分析您的肤质</p>
            <button class="btn" onclick="startScan()">开始检测</button>
        </div>
        
        <div class="tips">
            <h3>检测须知</h3>
            <div class="tip-item">📷 请在光线充足的环境下拍摄</div>
            <div class="tip-item">👤 脸部正对镜头，保持表情自然</div>
            <div class="tip-item">🧹 检测前请清洁面部</div>
            <div class="tip-item">📱 建议使用前置摄像头拍摄</div>
        </div>
    </div>

    <script>
        function startScan() {
            alert('AI 肤质检测功能开发中...\n\n敬请期待！');
        }
    </script>
</body>
</html>
