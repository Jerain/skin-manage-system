<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门店列表 - 皮肤管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
        .header { background: #667eea; color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 18px; }
        .back { position: absolute; left: 15px; top: 18px; color: white; text-decoration: none; }
        .list { padding: 15px; }
        .store-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .store-name { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
        .store-info { color: #666; font-size: 14px; margin-bottom: 5px; }
        .store-address { color: #888; font-size: 12px; }
        .store-btn { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 10px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="header">
        <a href="client.html" class="back">← 返回</a>
        <h1>🏪 门店列表</h1>
    </div>
    <div class="list" id="storeList">
        <p style="text-align:center;padding:20px;">加载中...</p>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        
        async function loadStores() {
            try {
                const res = await fetch(`${API_BASE}/stores`);
                const data = await res.json();
                const list = data.data?.list || data.data || [];
                
                if (list.length === 0) {
                    // 使用模拟数据
                    const stores = [
                        { id: 1, name: '旗舰店', address: '朝阳区建国路88号', phone: '010-12345678', distance: '500m' },
                        { id: 2, name: 'CBD店', address: '海淀区中关村大街1号', phone: '010-87654321', distance: '1.2km' },
                        { id: 3, name: '社区店', address: '东城区南锣鼓巷', phone: '010-11112222', distance: '2km' }
                    ];
                    renderStores(stores);
                } else {
                    renderStores(list);
                }
            } catch(e) {
                document.getElementById('storeList').innerHTML = '<p style="text-align:center;padding:20px;">加载失败</p>';
            }
        }
        
        function renderStores(stores) {
            document.getElementById('storeList').innerHTML = stores.map(s => `
                <div class="store-card">
                    <div class="store-name">${s.name}</div>
                    <div class="store-info">📞 ${s.phone}</div>
                    <div class="store-address">📍 ${s.address} (${s.distance || ''})</div>
                    <button class="store-btn" onclick="alert('预约功能开发中')">立即预约</button>
                </div>
            `).join('');
        }
        
        loadStores();
    </script>
</body>
</html>
