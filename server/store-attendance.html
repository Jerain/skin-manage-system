<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤打卡 - 门店端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #34C759, #30b350); min-height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 20px; text-align: center; color: white; }
        .back { position: absolute; left: 20px; top: 20px; color: white; text-decoration: none; font-size: 18px; }
        .card { background: white; margin: 20px; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .time { font-size: 48px; font-weight: bold; color: #333; }
        .date { font-size: 16px; color: #888; margin-top: 10px; }
        .status { margin: 20px 0; padding: 15px; background: #f5f5f5; border-radius: 10px; }
        .status-value { font-size: 18px; font-weight: bold; color: #34C759; }
        .btn { width: 200px; padding: 18px; background: #34C759; color: white; border: none; border-radius: 30px; font-size: 18px; cursor: pointer; margin: 20px auto; }
        .btn:active { transform: scale(0.95); }
        .btn.clock-out { background: #ff9500; }
        .history { margin: 20px; }
        .history-title { color: white; font-size: 16px; margin-bottom: 10px; }
        .history-item { background: rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="header">
        <a href="store.html" class="back">←</a>
        <h1>✅ 考勤打卡</h1>
    </div>
    <div class="card">
        <div class="time" id="currentTime">--:--</div>
        <div class="date" id="currentDate">加载中...</div>
        <div class="status">
            <div>上班状态</div>
            <div class="status-value" id="workStatus">未打卡</div>
        </div>
        <button class="btn" id="clockBtn" onclick="clock()">上班打卡</button>
    </div>
    <div class="history">
        <div class="history-title">📋 打卡记录</div>
        <div id="historyList"></div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        updateTime();
        setInterval(updateTime, 1000);
        
        let isClockedIn = false;
        
        function clock() {
            const btn = document.getElementById('clockBtn');
            const status = document.getElementById('workStatus');
            
            if (!isClockedIn) {
                isClockedIn = true;
                btn.textContent = '下班打卡';
                btn.classList.add('clock-out');
                status.textContent = '工作中';
                alert('上班打卡成功！');
            } else {
                isClockedIn = false;
                btn.textContent = '上班打卡';
                btn.classList.remove('clock-out');
                status.textContent = '已下班';
                alert('下班打卡成功！');
            }
            
            // 添加记录
            const now = new Date();
            const time = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = `<div class="history-item"><span>${isClockedIn ? '上班' : '下班'}</span><span>${time}</span></div>` + historyList.innerHTML;
        }
    </script>
</body>
</html>
