<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理 - 门店端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
        .header { background: #34C759; color: white; padding: 20px; text-align: center; position: relative; }
        .back { position: absolute; left: 15px; top: 18px; color: white; text-decoration: none; }
        .search { margin: 10px; padding: 12px; background: white; border-radius: 10px; }
        .search input { width: 100%; border: none; font-size: 14px; outline: none; }
        .list { padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .avatar { width: 50px; height: 50px; background: #e0e0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .info { flex: 1; }
        .name { font-weight: bold; font-size: 16px; }
        .detail { color: #666; font-size: 13px; margin-top: 3px; }
        .level { color: #ff9500; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="store.html" class="back">← 返回</a>
        <h1>👥 客户管理</h1>
    </div>
    <div class="search">
        <input type="text" placeholder="搜索客户姓名/手机号..." onkeyup="searchCustomers(this.value)">
    </div>
    <div class="list" id="customerList">
        <p style="text-align:center;padding:20px;">加载中...</p>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let customers = [];
        
        async function loadCustomers() {
            try {
                const res = await fetch(`${API_BASE}/customers`);
                const data = await res.json();
                customers = data.data?.list || data.data || [];
                renderCustomers(customers);
            } catch(e) {
                customers = [
                    { id: 1, name: '张三', phone: '13900139001', level: 'gold', balance: '1000' },
                    { id: 2, name: '李四', phone: '13900139002', level: 'silver', balance: '500' },
                ];
                renderCustomers(customers);
            }
        }
        
        function renderCustomers(list) {
            if (!list.length) {
                document.getElementById('customerList').innerHTML = '<p style="text-align:center;padding:20px;">暂无客户</p>';
                return;
            }
            document.getElementById('customerList').innerHTML = list.map(c => `
                <div class="card" onclick="alert('客户详情开发中')">
                    <div class="avatar">👤</div>
                    <div class="info">
                        <div class="name">${c.name}</div>
                        <div class="detail">📱 ${c.phone}</div>
                        <div class="level">💳 ${c.level} | ¥${c.balance}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function searchCustomers(keyword) {
            const filtered = customers.filter(c => c.name.includes(keyword) || c.phone.includes(keyword));
            renderCustomers(filtered);
        }
        
        loadCustomers();
    </script>
</body>
</html>
