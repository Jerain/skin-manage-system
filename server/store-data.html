<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据看板 - 门店端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
        .header { background: #34C759; color: white; padding: 20px; text-align: center; position: relative; }
        .back { position: absolute; left: 15px; top: 18px; color: white; text-decoration: none; }
        .card { background: white; margin: 15px; border-radius: 12px; padding: 20px; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; }
        .stat-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: #666; }
        .stat-value { font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="header">
        <a href="store.html" class="back">← 返回</a>
        <h1>📈 数据看板</h1>
    </div>
    <div class="card">
        <div class="card-title">📊 今日数据</div>
        <div class="stat-row"><span class="stat-label">新增客户</span><span class="stat-value">3</span></div>
        <div class="stat-row"><span class="stat-label">服务订单</span><span class="stat-value">12</span></div>
        <div class="stat-row"><span class="stat-label">营业收入</span><span class="stat-value">¥2,580</span></div>
        <div class="stat-row"><span class="stat-label">完单率</span><span class="stat-value">95%</span></div>
    </div>
    <div class="card">
        <div class="card-title">📈 本月累计</div>
        <div class="stat-row"><span class="stat-label">服务客户</span><span class="stat-value">186</span></div>
        <div class="stat-row"><span class="stat-label">营业收入</span><span class="stat-value">¥38,520</span></div>
        <div class="stat-row"><span class="stat-label">新会员</span><span class="stat-value">28</span></div>
    </div>
</body>
</html>
