<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业绩查询 - 门店端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
        .header { background: #34C759; color: white; padding: 20px; text-align: center; position: relative; }
        .back { position: absolute; left: 15px; top: 18px; color: white; text-decoration: none; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #34C759; }
        .stat-label { font-size: 12px; color: #888; margin-top: 5px; }
        .list { padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .card-title { font-weight: bold; margin-bottom: 10px; }
        .card-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .card-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="header">
        <a href="store.html" class="back">← 返回</a>
        <h1>📊 我的业绩</h1>
    </div>
    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="todayIncome">¥0</div>
            <div class="stat-label">今日收入</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="monthIncome">¥0</div>
            <div class="stat-label">本月收入</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="orderCount">0</div>
            <div class="stat-label">服务订单</div>
        </div>
    </div>
    <div class="list">
        <div class="card">
            <div class="card-title">📈 业绩趋势</div>
            <div class="card-row"><span>今日</span><span>¥0</span></div>
            <div class="card-row"><span>昨日</span><span>¥0</span></div>
            <div class="card-row"><span>本周</span><span>¥0</span></div>
            <div class="card-row"><span>本月</span><span>¥0</span></div>
        </div>
    </div>

    <script>
        // 模拟数据
        document.getElementById('todayIncome').textContent = '¥298';
        document.getElementById('monthIncome').textContent = '¥12,580';
        document.getElementById('orderCount').textContent = '28';
    </script>
</body>
</html>
