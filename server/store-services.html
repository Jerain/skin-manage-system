<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务项目 - 门店端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
        .header { background: #34C759; color: white; padding: 20px; text-align: center; position: relative; }
        .back { position: absolute; left: 15px; top: 18px; color: white; text-decoration: none; }
        .list { padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; gap: 15px; }
        .icon { width: 60px; height: 60px; background: #e8f5e9; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .info { flex: 1; }
        .name { font-weight: bold; font-size: 16px; }
        .price { color: #ff9500; font-size: 18px; font-weight: bold; margin-top: 5px; }
        .desc { color: #888; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="store.html" class="back">← 返回</a>
        <h1>💆 服务项目</h1>
    </div>
    <div class="list" id="serviceList">
        <p style="text-align:center;padding:20px;">加载中...</p>
    </div>

    <script>
        const services = [
            { name: '深层补水护理', price: 298, duration: 60, desc: '玻尿酸深层补水' },
            { name: '小气泡清洁', price: 198, duration: 45, desc: '深层清洁毛孔' },
            { name: '光子嫩肤', price: 1280, duration: 90, desc: '激光美容嫩肤' },
            { name: '面部按摩', price: 168, duration: 30, desc: '放松面部肌肉' },
        ];
        document.getElementById('serviceList').innerHTML = services.map(s => `
            <div class="card">
                <div class="icon">💆</div>
                <div class="info">
                    <div class="name">${s.name}</div>
                    <div class="price">¥${s.price}</div>
                    <div class="desc">⏱️ ${s.duration}分钟 | ${s.desc}</div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
