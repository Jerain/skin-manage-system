<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375px, initial-scale=1.0">
    <title>门店端小程序首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; width: 375px; margin: 0 auto; border: 1px solid #ddd; min-height: 667px; }
        
        /* Header */
        .employee-header { display: flex; align-items: center; gap: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px 20px; border-radius: 0 0 20px 20px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #667eea; font-weight: bold; }
        .employee-info { display: flex; flex-direction: column; gap: 5px; }
        .employee-name { font-size: 20px; font-weight: bold; color: #fff; }
        .employee-role { font-size: 14px; color: rgba(255,255,255,0.8); }
        
        /* Attendance Card */
        .attendance-card { background: #fff; margin: 15px; border-radius: 10px; padding: 20px; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; }
        .attendance-status { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .status-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .label { font-size: 12px; color: #999; }
        .value { font-size: 14px; color: #333; font-weight: bold; }
        .tag { padding: 3px 8px; border-radius: 4px; font-size: 12px; background: #e6f7ed; color: #67C23A; }
        .tag.warning { background: #fdf6ec; color: #E6A23C; }
        .attendance-empty { text-align: center; padding: 20px; color: #999; }
        .buttons { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 5px; font-size: 14px; cursor: pointer; }
        .btn-primary { background: #409EFF; color: #fff; }
        .btn-success { background: #67C23A; color: #fff; }
        
        /* Quick Actions */
        .quick-actions { display: flex; justify-content: space-around; background: #fff; margin: 15px; border-radius: 10px; padding: 25px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .action-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .action-icon svg { width: 30px; height: 30px; }
        .action-item text { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <!-- Employee Header -->
    <view class="employee-header">
        <div class="avatar">技师</div>
        <div class="employee-info">
            <text class="employee-name">测试技师</text>
            <text class="employee-role">技师</text>
        </div>
    </view>
    
    <!-- Attendance Card -->
    <view class="attendance-card">
        <div class="card-title">今日考勤</div>
        <div class="attendance-status">
            <div class="status-item">
                <text class="label">上班时间</text>
                <text class="value">09:00</text>
            </div>
            <div class="status-item">
                <text class="label">下班时间</text>
                <text class="value">18:00</text>
            </div>
            <div class="status-item">
                <text class="label">状态</text>
                <span class="tag">正常</span>
            </div>
        </div>
        
        <div class="buttons">
            <button class="btn btn-primary" disabled>上班打卡</button>
            <button class="btn btn-success">下班打卡</button>
        </div>
    </view>
    
    <!-- Quick Actions -->
    <view class="quick-actions">
        <div class="action-item">
            <div class="action-icon">
                <svg viewBox="0 0 24 24" fill="#67C23A"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <text>客户签到</text>
        </div>
        <div class="action-item">
            <div class="action-icon">
                <svg viewBox="0 0 24 24" fill="#409EFF"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
            </div>
            <text>今日预约</text>
        </div>
        <div class="action-item">
            <div class="action-icon">
                <svg viewBox="0 0 24 24" fill="#E6A23C"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <text>客户管理</text>
        </div>
    </view>
</body>
</html>
